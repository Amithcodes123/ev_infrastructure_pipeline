
sources:

  - name: warehouse_bronze

    database: ev-infrastructure-pipeline

    schema: bronze_layer

    tables:

      - name: raw_live_occupancy

        description: "TomTom micro-batch telemetry ingestion live plug occupancy states."

        columns:

          - name: tomtom_station_id

            tests:

              - not_null

          - name: ingestion_timestamp

            tests:

              - not_null

      - name: raw_bnetza_registry

        description: "BNetzA static charging station registry tracking physical installations."

        columns:

          - name: postleitzahl

            tests:

              - not_null



models:

  - name: mart_demand_gap_analysis

    description: "Gold layer production analytical mart constructed via spatial padding and substring joins."

    columns:

      - name: tomtom_station_id

        description: "The operational foreign identifier tracking the map node facility."

        tests:

          - not_null # Removed 'unique' because data granularity includes multiple timestamps and connector types.



      - name: geographic_postal_zone

        description: "The cleaned, 5-digit padded German postal zone used for spatial integrity."

        tests:

          - not_null



      - name: current_utilization_rate

        description: "Calculated percentage tracking real-time electrical socket consumption pressure."

        tests:

          - not_null



      - name: allocation_demand_gap_score

        description: "The final composite index tracking regional EV asset infrastructure stress."

        tests:

          - not_null